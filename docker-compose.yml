services:
  postgres:
    image: postgres:16
    container_name: perrot_motors_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-perrot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-perrot_password}
      POSTGRES_DB: ${POSTGRES_DB:-perrot_motors}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
